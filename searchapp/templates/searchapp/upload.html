<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Upload File</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">📤 Upload Image or PDF File</h2>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <input class="form-control" type="file" name="file" accept=".jpg,.jpeg,.png,.pdf" required>
                </div>
                <button class="btn btn-success w-100" type="submit">Upload</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{% url 'search' %}" class="btn btn-secondary">🔍 Back to Search</a>
            </div>
        </div>
    </div>
</body>
</html>
